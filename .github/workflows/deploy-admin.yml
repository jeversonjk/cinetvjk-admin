name: 🚀 Deploy Admin Assets

on:
  workflow_dispatch:

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Baixar JS compilado
        run: |
          curl --fail --retry 3 --retry-delay 5 -L \
            "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index-BdJeeZ7L.js" \
            -o assets/index-BdJeeZ7L.js
          SIZE=$(wc -c &lt; assets/index-BdJeeZ7L.js)
          echo "JS baixado: $SIZE bytes"
          if [ "$SIZE" -lt 100000 ]; then
            echo "ERRO: JS muito pequeno ($SIZE bytes), abortando"
            exit 1
          fi

      - name: Baixar CSS compilado
        run: |
          curl --fail --retry 3 --retry-delay 5 -L \
            "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index-DHbCgQx5.css" \
            -o assets/index-DHbCgQx5.css
          SIZE=$(wc -c &lt; assets/index-DHbCgQx5.css)
          echo "CSS baixado: $SIZE bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "ERRO: CSS muito pequeno ($SIZE bytes), abortando"
            exit 1
          fi

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/index-BdJeeZ7L.js assets/index-DHbCgQx5.css
          git diff --staged --quiet && echo "Nenhuma mudança" && exit 0
          git commit -m "fix: atualizar assets do painel admin"
          git push
          echo "✅ Deploy concluído!"
