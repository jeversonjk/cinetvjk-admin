name: 🚀 Deploy Admin Assets

on:
  workflow_dispatch:

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Baixar JS
        run: wget -q "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index-DEmgeF_2.js" -O assets/index-DEmgeF_2.js

      - name: Baixar CSS
        run: wget -q "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index-BaOmOx1O.css" -O assets/index-BaOmOx1O.css

      - name: Verificar downloads
        run: ls -lh assets/index-DEmgeF_2.js assets/index-BaOmOx1O.css

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/index-DEmgeF_2.js assets/index-BaOmOx1O.css
          git diff --staged --quiet && exit 0
          git commit -m "fix: assets painel admin v8"
          git push
