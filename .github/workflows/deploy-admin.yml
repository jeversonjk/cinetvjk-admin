name: 🚀 Deploy Admin Assets

on:
  workflow_dispatch:

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Baixar assets compilados
        run: |
          curl --fail --retry 3 -L \
            "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index-DEmgeF_2.js" \
            -o assets/index-DEmgeF_2.js
          curl --fail --retry 3 -L \
            "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index-BaOmOx1O.css" \
            -o assets/index-BaOmOx1O.css
          echo "✅ Assets baixados com sucesso"
          ls -lh assets/

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/index-DEmgeF_2.js assets/index-BaOmOx1O.css
          git diff --staged --quiet && echo "Sem mudanças" && exit 0
          git commit -m "fix: assets painel admin v8"
          git push
          echo "✅ Deploy concluído!"
