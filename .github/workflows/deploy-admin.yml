name: 🚀 Deploy Admin Assets

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite "deploy" para confirmar'
        required: true
        default: 'deploy'

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Baixar assets compilados (JS)
        run: |
          curl -L \
            "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index-BdJeeZ7L.js" \
            -o assets/index-BdJeeZ7L.js
          echo "✅ JS baixado: $(wc -c < assets/index-BdJeeZ7L.js) bytes"

      - name: Baixar assets compilados (CSS)
        run: |
          curl -L \
            "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index-DHbCgQx5.css" \
            -o assets/index-DHbCgQx5.css
          echo "✅ CSS baixado: $(wc -c < assets/index-DHbCgQx5.css) bytes"

      - name: Commit e push dos novos assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/index-BdJeeZ7L.js assets/index-DHbCgQx5.css
          git diff --staged --quiet || git commit -m "chore: atualizar assets compilados do painel admin"
          git push
          echo "🎉 Deploy concluído! Vercel irá atualizar automaticamente."
