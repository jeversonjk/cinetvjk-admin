name: 🚀 Deploy Admin Assets

on:
  workflow_dispatch:

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Baixar JS
        run: wget -q "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index-CywxPJLM.js" -O assets/index-CywxPJLM.js

      - name: Baixar CSS
        run: wget -q "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index-DvUw4owq.css" -O assets/index-DvUw4owq.css

      - name: Criar index.html correto
        run: |
          python3 -c "
          html = '&lt;!doctype html&gt;&lt;html lang=\"pt-BR\" class=\"dark\"&gt;&lt;head&gt;&lt;meta charset=\"UTF-8\" /&gt;&lt;title&gt;CineTv Jk - Painel Admin&lt;/title&gt;&lt;script type=\"module\" crossorigin src=\"/assets/index-CywxPJLM.js\"&gt;&lt;/script&gt;&lt;link rel=\"stylesheet\" crossorigin href=\"/assets/index-DvUw4owq.css\"&gt;&lt;/head&gt;&lt;body&gt;<div id="\&quot;root\&quot;"></div>&lt;/body&gt;&lt;/html&gt;'
          open('index.html', 'w').write(html)
          print('OK:', open('index.html').read()[:50])
          "

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/index-CywxPJLM.js assets/index-DvUw4owq.css index.html
          git diff --staged --quiet && exit 0
          git commit -m "fix: assets e index.html painel admin v9"
          git push
