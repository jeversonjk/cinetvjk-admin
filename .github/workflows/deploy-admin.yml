name: 🚀 Deploy Admin Assets

on:
  workflow_dispatch:

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Baixar JS
        run: wget -q "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index-CywxPJLM.js" -O assets/index-CywxPJLM.js

      - name: Baixar CSS
        run: wget -q "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index-DvUw4owq.css" -O assets/index-DvUw4owq.css

      - name: Baixar index.html
        run: wget -q "https://ohjpkvrmbdcqnlcuiwxf.supabase.co/storage/v1/object/public/admin-assets/index.html" -O index.html

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/index-CywxPJLM.js assets/index-DvUw4owq.css index.html
          git diff --staged --quiet && exit 0
          git commit -m "fix: assets e index.html v9 - sem HTML no YAML"
          git push
